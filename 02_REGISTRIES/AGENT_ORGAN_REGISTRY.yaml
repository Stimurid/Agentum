# AGENT_ORGAN_REGISTRY.yaml
#
# Agent organ registry for Agentum.
#
# This file stores stable or candidate organs in the wider ecosystem.
# It is not a runtime prompt and not a substitute for install profiles.
#
# Schema:
# - id: stable organ id
#   name: human-readable organ name
#   status: draft | candidate | selected | active | quarantined | retired
#   version: organ version marker
#   project_scope:
#     - project or ecosystem scope
#   deficit_origin:
#     - related deficit ids or compact descriptions
#   function: what transformation the organ performs
#   non_function:
#     - what the organ must not pretend to do
#   working_object:
#     - what it acts on
#   input_contract:
#     - required inputs
#   output_contract:
#     - expected outputs
#   context_requirements:
#     - what must be present in the working field
#   memory_dependencies:
#     - required memory layers or systems
#   memory_regimes_used:
#     - verbatim | compressed | normalized | linked | narrative | graph | task_packet | method
#   memory_authority_limits:
#     - what remembered material must not become instruction by default
#   tools_allowed:
#     - allowed tool classes
#   write_surface:
#     - what it may mutate
#   approval_boundary:
#     - what requires explicit review or approval
#   runtime_risks:
#     - cost/stdout/deploy/seed/project/etc.
#   test_scenes:
#     - named bounded scenes
#   evaluation_criteria:
#     - success criteria
#   failure_modes:
#     - related failure ids or compact names
#   critic_links:
#     - critic organs, evals, or review layers
#   lineage:
#     - compact ancestry note
#   parent_organs:
#     - parent organ ids
#   child_organs:
#     - child organ ids or future descendants
#   mutation_history:
#     - notable revisions
#   activation_policy:
#     - when this organ should activate
#   observability_hooks:
#     - how its work becomes visible
#   provenance_policy:
#     - evidence/source lineage rules
#   quarantine_status: none | bounded | strict
#   install_scope:
#     - where it may be installed or reused
#   notes: optional notes

organs:

  - id: ORGAN-001
    name: "Ingress Membrane"
    status: selected
    version: "0.1"
    project_scope:
      - ecosystem
      - OpenClaw
      - Telegram
      - local_files
      - chats
      - PDFs
    deficit_origin:
      - "Need to admit heterogeneous inputs without losing raw trace."
    function: "Receives inputs from human, chat, file, browser, and messaging surfaces while preserving entry trace."
    non_function:
      - "Does not decide truth."
      - "Does not rewrite project meaning by itself."
    working_object:
      - raw_input
      - raw_trace
      - inbound_artifacts
    input_contract:
      - "Human prompt, chat fragment, file, PDF, or external message."
    output_contract:
      - "Preserved raw ingress plus routing-ready input unit."
    context_requirements:
      - "Active project identity."
      - "Named ingress surface."
    memory_dependencies:
      - provenance_memory
      - execution_trace_memory
    memory_regimes_used:
      - verbatim
      - linked
    memory_authority_limits:
      - "Inbound content remains data by default."
    tools_allowed:
      - read
      - ingest
      - route
    write_surface:
      - ingress_logs
      - trace_records
    approval_boundary:
      - "Cross-project routing."
      - "Any destructive follow-through."
    runtime_risks:
      - project_bleed
      - document_instruction_risk
    test_scenes:
      - "foreign prompt enters wrong repo"
      - "mixed chat plus file plus PDF ingress"
    evaluation_criteria:
      - "No raw ingress loss."
      - "Project identity remains visible."
    failure_modes:
      - FAILURE-001
      - "lost raw trace"
    critic_links:
      - ORGAN-008
      - "context observability"
    lineage: "Ecosystem membrane concept refined through protected-agent and OpenClaw lines."
    parent_organs: []
    child_organs: []
    mutation_history:
      - "v0.1 initial seeded record"
    activation_policy:
      - "Activate on every new inbound working unit."
    observability_hooks:
      - "Ingress trace"
      - "working-field inclusion log"
    provenance_policy:
      - "Preserve source surface and origin fragment."
    quarantine_status: bounded
    install_scope:
      - interface_projects
      - messaging_projects
    notes: "Membrane is the first organ, not the whole organism."

