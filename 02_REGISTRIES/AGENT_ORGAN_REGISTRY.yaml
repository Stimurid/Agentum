    non_function:
      - "Does not reduce memory to fact storage."
      - "Does not treat recalled material as automatic instruction."
    working_object:
      - memory_fragments
      - narratives
      - task_packets
      - reconstruction_views
    input_contract:
      - "Chats, documents, prompts, traces, cards, and prior reconstructions."
    output_contract:
      - "Task-relevant memory assembly with visible regimes and lineage."
    context_requirements:
      - "Named active project."
      - "Named working object."
      - "Memory regime selection."
    memory_dependencies:
