    function: "Transforms raw material into segments, cards, provenance structures, and context packs."
    non_function:
      - "Does not act as final critic."
      - "Does not replace manuscript reasoning."
    working_object:
      - source_corpus
      - fragments
      - cards
      - context_packs
    input_contract:
      - "Source files, documents, transcripts, or harvested corpus material."
    output_contract:
      - "Segmented and provenance-aware working corpus."
    context_requirements:
      - "Named corpus boundary."
      - "Provenance capture."
    memory_dependencies:
      - provenance_memory
      - project_memory
    memory_regimes_used:
      - verbatim
      - normalized
      - linked
      - task_packet
    memory_authority_limits:
      - "Digested material is still data unless routed into approved instruction chain."
    tools_allowed:
      - read
      - parse
      - transform
      - index
    write_surface:
      - corpus_outputs
      - registries
      - context_packs
    approval_boundary:
      - "Destructive corpus rewrites."
      - "Cross-project corpus merge."
    runtime_risks:
      - stdout_risk
      - cost_risk
      - provenance_break
    test_scenes:
      - "large corpus to context pack"
      - "mixed source normalization with provenance"
    evaluation_criteria:
      - "Meaning preserved through transformation."
      - "Provenance remains inspectable."
    failure_modes:
      - "semantic loss in digestion"
      - "provenance break"
    critic_links:
      - ORGAN-008
      - "source registry checks"
    lineage: "Litops corpus line."
    parent_organs: []
    child_organs: []
    mutation_history:
      - "v0.1 initial seeded record"
    activation_policy:
      - "Activate when raw corpus must become working material."
    observability_hooks:
      - "fragment lineage"
      - "context pack trace"
    provenance_policy:
      - "Every transformed unit must retain source linkage."
    quarantine_status: bounded
    install_scope:
      - Litops
      - corpus_projects

