      - assemble
      - compare
      - route
    write_surface:
      - memory_records
      - reconstructions
      - task_packets
    approval_boundary:
      - "Automatic overwrite of manual memory artifacts."
    runtime_risks:
      - memory_authority_risk
      - seed_risk
      - context_bloat_risk
    test_scenes:
      - "recover long project continuity"
      - "reconstruct method line from fragmented trace"
    evaluation_criteria:
      - "Continuity restored without fake certainty."
      - "Memory regime remains explicit."
    failure_modes:
      - FAILURE-004
      - "memory as authority"
      - "reconstructive drift"
    critic_links:
      - ORGAN-008
      - "truth microcheck"
    lineage: "MemoryWorkbench line."
    parent_organs: []
    child_organs: []
    mutation_history:
      - "v0.1 initial seeded record"
    activation_policy:
      - "Activate when continuity, recall, or reconstruction is needed."
    observability_hooks:
      - "context observability"
      - "memory regime log"
    provenance_policy:
      - "Recovered fragments retain source and status markers."
    quarantine_status: bounded
    install_scope:
      - memory-workbench
