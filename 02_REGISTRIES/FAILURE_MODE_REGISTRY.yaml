# FAILURE_MODE_REGISTRY.yaml
#
# Failure mode registry for protected-agent-kit.
#
# This file stores the concrete failures the kit must prevent, detect, or route.
# It is the bridge between research and eval scenarios.
#
# Schema:
# - id: stable failure id
#   title: short failure name
#   symptom: observable symptom
#   trigger: common prompt/tool/context trigger
#   risk: why it is dangerous
#   guards: patterns / files / hooks / commands that should catch it
#   eval_scenarios: related eval scenario ids or names
#   sources: source ids from SOURCE_REGISTRY.yaml
#   patterns: pattern ids from PATTERN_REGISTRY.yaml
#   status: open | covered_v0 | covered_v1 | needs_test | research_only
#   notes: optional notes

failures:

  # ------------------------------------------------------------
  # Prompt / instruction failures
  # ------------------------------------------------------------

  - id: FAILURE-001
