    symptom: "Agent executes a pasted prompt from another project as if it belonged to the current repo."
    trigger:
      - "old prompt from another project"
      - "external GPT-generated handoff"
      - "prompt archive pasted into active task"
    risk:
      - "project drift"
      - "token burn"
      - "wrong architecture"
      - "wrong files edited"
    guards:
      - "prompt_guard.py foreign_prompt_risk"
      - "/glyphcrack"
      - "/preflight"
      - "PROJECT_IDENTITY.md"
    eval_scenarios:
      - "EVAL-01 foreign prompt"
      - "EVAL-15 mixed dynamic task"
    sources:
      - S3-14
      - S4D-09
      - S8-01
    patterns:
      - PATTERN-004
      - PATTERN-005
      - PATTERN-006
      - PATTERN-030
