# DEFICIT_REGISTRY.yaml
#
# Deficit registry for Agentum.
#
# This file stores recurrent project pressure that may require:
# - a new organ
# - a guard change
# - a profile/install correction
# - a memory or orchestration fix
#
# Schema:
# - id: stable deficit id
#   title: compact deficit name
#   status: open | testing | mitigated | resolved | archived
#   severity: low | medium | high | critical
#   observed_in_project:
#     - project or ecosystem scope
#   observed_in_layer:
#     - runtime | memory | prompt | retrieval | review | orchestration | install | governance
#   source_fragment:
#     - minimal source symptom or trigger
#   evidence_refs:
#     - file paths, failure ids, eval ids, or notes
#   repeated_count: exact or approximate recurrence marker
#   failure_type:
#     - mismatch | omission | false_confidence | drift | overload | bleed | collapse | authority_confusion
#   semantic_loss: what meaning, continuity, or function is being damaged
#   suspected_cause:
#     - current best explanations
#   scene_signature:
#     - recurring scene where the deficit shows up
#   memory_signature:
#     - related memory regime confusion
#   required_capability:
#     - what capability is missing
#   current_workaround:
#     - how humans or existing organs currently compensate
#   candidate_organs:
#     - related organ ids or compact names
#   candidate_non_organ_fix:
#     - config / profile / guard / process alternatives
#   test_scene:
#     - bounded scene for validating resolution
#   evaluation_criteria:
#     - what counts as actual mitigation
#   resolved_by:
#     - selected organ, profile, guard, or process change
#   residual_risk:
#     - what remains dangerous even after mitigation
#   notes: optional notes

deficits:

  - id: DEFICIT-001
    title: "Project bleed and foreign execution"
    status: mitigated
    severity: critical
    observed_in_project:
      - ecosystem
      - Agentum
      - Litops
      - WhiteCrow
      - ModerBober
      - Quinta
    observed_in_layer:
      - runtime
      - prompt
      - governance
    source_fragment:
      - "Old or foreign prompt is treated as belonging to the active repo."
    evidence_refs:
      - FAILURE-001
      - FAILURE-002
      - "04_KITS/v0_minimal/AGENTS.md"
    repeated_count: "high"
    failure_type:
      - bleed
      - mismatch
    semantic_loss: "The working object and project identity are replaced by a foreign task line."
    suspected_cause:
      - "Weak project identity check."
      - "Prompt accepted before routing."
    scene_signature:
      - "broad or imported prompt enters wrong project during active work"
    memory_signature:
      - "recalled task line overrides present project state"
    required_capability:
      - "identity-first routing and quarantine"
    current_workaround:
      - "Manual human correction and repeated restatement of project boundaries."
    candidate_organs:
      - ORGAN-001
      - ORGAN-006
    candidate_non_organ_fix:
      - "prompt guard"
      - "install profile contract"
    test_scene:
      - "foreign prompt in active repo"
    evaluation_criteria:
      - "Foreign prompt is routed before file mutation starts."
    resolved_by:
      - "v0_minimal prompt guard and project identity layer"
    residual_risk:
      - "Cross-project ecosystems remain naturally bleed-prone."

