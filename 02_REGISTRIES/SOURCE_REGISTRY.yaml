# This file preserves the research body behind the kit.
# It is not a runtime prompt and should not be copied wholesale into target projects.
#
# Schema:
# - id: stable source id
#   title: source title
#   type: official_docs | github_repo | blog | paper | security_research | drive_doc | personal_memory | chat_research
#   url: external URL when available
#   wave: wave where it was collected
#   level: context_only | policy_like | workflow_artifact | runtime_guard | sandbox_permission | eval_postmortem | security | memory_recovery | architecture_guard
#   key_use: why it matters
#   take: what to adapt
#   do_not_copy: what not to blindly copy
#   status: keep | maybe | reference | dangerous | drop
#   confidence: high | medium | low
#   notes: optional notes

